<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c2230"/>
      <stop offset="1" stop-color="#0e1014"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#19e0d6"/>
      <stop offset="1" stop-color="#7cf6c0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- winding route line (the trail) -->
  <path d="M86 372 C150 300 120 232 196 214 C272 196 246 132 330 138 C392 142 410 196 426 150"
        fill="none" stroke="url(#route)" stroke-width="16" stroke-linecap="round" filter="url(#glow)"/>
  <!-- control dots in category colours -->
  <circle cx="196" cy="214" r="11" fill="#3ec98a"/>
  <circle cx="330" cy="138" r="11" fill="#ff6b6b"/>
  <circle cx="426" cy="150" r="13" fill="#ffd23f"/>

  <!-- minimalist bike: two wheels + frame -->
  <g stroke="#e9ecf1" stroke-width="13" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.96">
    <circle cx="168" cy="372" r="70"/>
    <circle cx="356" cy="372" r="70"/>
    <path d="M168 372 L246 256 L330 256"/>
    <path d="M246 256 L300 372 L356 372"/>
    <path d="M168 372 L300 372"/>
    <path d="M330 246 L356 246"/>
  </g>
  <circle cx="168" cy="372" r="8" fill="#e9ecf1"/>
  <circle cx="356" cy="372" r="8" fill="#e9ecf1"/>
</svg>
